<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TrustLens</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-page admin-page">
    <div class="background-overlay"></div>

    <header class="dashboard-header glass slide-up">
        <div class="logo">Trust<span>Lens</span> Admin</div>
        <div class="user-info">
            <span id="userEmail">Loading...</span>
            <button id="logoutBtn" class="btn btn-sm btn-outline">Logout</button>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Main Admin View -->
        <main class="dashboard-main fade-in" style="grid-column: span 2;">
            <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <!-- System Stats -->
                <section class="stats-section glass">
                    <h3>System Overview</h3>
                    <div class="stats-grid"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                        <div class="stat-card"
                            style="padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 4px solid var(--primary);">
                            <div class="stat-label" style="color: var(--text-dim); font-size: 0.9rem;">Total Analyses
                            </div>
                            <div class="stat-value" id="totalAnalyses"
                                style="font-size: 2rem; font-weight: bold; margin-top: 10px;">0</div>
                        </div>
                        <div class="stat-card"
                            style="padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 4px solid var(--danger);">
                            <div class="stat-label" style="color: var(--text-dim); font-size: 0.9rem;">Active Complaints
                            </div>
                            <div class="stat-value" id="activeComplaints"
                                style="font-size: 2rem; font-weight: bold; margin-top: 10px;">0</div>
                        </div>
                    </div>
                </section>

                <!-- Configuration/Admin Tools -->
                <section class="admin-tools glass">
                    <h3>Management Options</h3>
                    <div class="admin-actions"
                        style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
                        <button class="btn btn-outline btn-block">Download Audit Logs</button>
                        <button class="btn btn-primary btn-block">Generate Security Report</button>
                    </div>
                </section>
            </div>

            <!-- User Management -->
            <section class="user-management-section glass slide-up" style="margin-top: 32px;">
                <h3>User Management</h3>
                <div style="margin-bottom: 20px;">
                    <form id="addUserForm" style="display: flex; gap: 10px; max-width: 600px;">
                        <input type="email" id="newEmail" placeholder="New User Email" required style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15,23,42,0.6); color: white;">
                        <input type="password" id="newPassword" placeholder="Password" required style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15,23,42,0.6); color: white;">
                        <button type="submit" class="btn btn-primary" style="padding: 10px 20px; border-radius: 8px;">Add User</button>
                    </form>
                </div>
                <div class="table-responsive">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr>
                                <td colspan="3" style="text-align: center; padding: 40px; color: var(--text-dim);">Loading users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Full Complaint List -->
            <section class="history-section glass slide-up" style="margin-top: 32px;">
                <h3>Active User Reports / Complaints</h3>
                <div class="table-responsive">
                    <table id="complaintsTable">
                        <thead>
                            <tr>
                                <th>Entity</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="complaintsBody">
                            <!-- Dynamically populated -->
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-dim);">No
                                    active reports found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/main.js"></script>
</body>

</html>
