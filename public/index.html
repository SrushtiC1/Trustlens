<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrustLens</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="background-overlay"></div>
    <div class="container">
        <div class="auth-card glass slide-up">
            <div class="logo fade-in">Trust<span>Lens</span></div>
            <h2 class="fade-in">Member Login</h2>
            <form id="loginForm" class="fade-in">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login to Dashboard</button>
            </form>
            <p class="auth-footer fade-in">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/main.js"></script>
</body>
</html>
